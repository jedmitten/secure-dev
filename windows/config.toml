# %USERPROFILE%\.config\secure-dev\config.toml
# Secure Python Development Environment — Windows / VeraCrypt
# Edit before running install.ps1

[container]
name        = "SecureProject"
# Path to the VeraCrypt container file
path        = "C:\\Users\\%USERNAME%\\Secure\\secure-project.vc"
# Drive letter VeraCrypt will mount the volume at
drive_letter = "S"
size_mb     = 51200   # 50 GB in MB

[security]
# Windows Credential Manager target name
credential_target   = "secure-dev-apfs"
credential_username = "apfs-password"
yubikey_slot        = 2
hmac_salt_path      = "%USERPROFILE%\\.config\\secure-dev\\hmac.salt"
bitwarden_item_name = "SecureProject VeraCrypt"
# Path to VeraCrypt CLI (veracrypt.exe or VeraCrypt.exe)
veracrypt_cli       = "C:\\Program Files\\VeraCrypt\\VeraCrypt.exe"

[idle]
timeout_minutes        = 15
check_interval_seconds = 60

[logging]
detach_log = "%USERPROFILE%\\.config\\secure-dev\\detach.log"